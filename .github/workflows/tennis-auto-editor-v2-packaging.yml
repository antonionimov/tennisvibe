name: tennis-auto-editor-v2-packaging

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/tennis-auto-editor-v2/**'
      - '.github/workflows/tennis-auto-editor-v2-packaging.yml'

jobs:
  build-standalone:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-standalone
            os: ubuntu-24.04
            embedded_python_url: https://github.com/astral-sh/python-build-standalone/releases/download/20260414/cpython-3.10.20%2B20260414-x86_64-unknown-linux-gnu-install_only.tar.gz
            embedded_python_helper: prepare-embedded-python-linux.sh
            bundle_command: npm run tauri:bundle:ubuntu:standalone
            artifact_glob: src-tauri/target/release/bundle/deb/*.deb
          - label: macos-standalone
            os: macos-13
            embedded_python_url: https://github.com/astral-sh/python-build-standalone/releases/download/20260414/cpython-3.10.20%2B20260414-x86_64-apple-darwin-install_only.tar.gz
            embedded_python_helper: prepare-embedded-python-macos.sh
            bundle_command: npm run tauri:bundle:mac:standalone
            artifact_glob: src-tauri/target/release/bundle/dmg/*.dmg
          - label: windows-standalone
            os: windows-2022
            embedded_python_url: https://github.com/astral-sh/python-build-standalone/releases/download/20260414/cpython-3.10.20%2B20260414-x86_64-pc-windows-msvc-install_only.tar.gz
            embedded_python_helper: prepare-embedded-python-windows.sh
            bundle_command: npm run tauri:bundle:windows:standalone
            artifact_glob: src-tauri/target/release/bundle/nsis/*.exe

    defaults:
      run:
        shell: bash
        working-directory: apps/tennis-auto-editor-v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/tennis-auto-editor-v2/package-lock.json

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ffmpeg

      - name: Install Windows system dependencies
        if: runner.os == 'Windows'
        run: |
          choco install ffmpeg --no-progress -y

      - name: Install npm dependencies
        run: npm ci

      - name: Download and stage embedded Python
        run: |
          EMBEDDED_ARCHIVE="$RUNNER_TEMP/embedded-python.tar.gz"
          curl -L --fail --output "$EMBEDDED_ARCHIVE" "${{ matrix.embedded_python_url }}"
          bash "./scripts/${{ matrix.embedded_python_helper }}" "$EMBEDDED_ARCHIVE"

      - name: Build standalone bundle
        run: |
          export TENNIS_VENDOR_PYTHON_BIN=python
          export TENNIS_STANDALONE_FFMPEG_BIN="$(command -v ffmpeg || command -v ffmpeg.exe)"
          export TENNIS_STANDALONE_FFPROBE_BIN="$(command -v ffprobe || command -v ffprobe.exe)"
          echo "Using ffmpeg at: $TENNIS_STANDALONE_FFMPEG_BIN"
          echo "Using ffprobe at: $TENNIS_STANDALONE_FFPROBE_BIN"
          ${{ matrix.bundle_command }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: tennis-auto-editor-v2-${{ matrix.label }}
          path: apps/tennis-auto-editor-v2/${{ matrix.artifact_glob }}
          if-no-files-found: error
